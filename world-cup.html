<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFA World Cup 2026 — Draw Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    /* ─── TOKENS ─────────────────────────────────────────────────── */
    :root {
      --bg:          #F4F7FB;
      --surface:     #FFFFFF;
      --surf-con:    #EBF0F6;
      --surf-hi:     #E2E8F0;
      --border:      rgba(0,0,0,.08);
      --text:        #1A2533;
      --dim:         #52677A;
      --muted:       #8899AA;
      --primary:     #1558A8;
      --primary-bg:  rgba(21,88,168,.07);
      --on-primary:  #FFFFFF;
      --gold:        #9A6E00;
      --gold-hi:     #C09215;
      --win:         #166534;
      --draw:        #7C4D00;
      --loss:        #991B1B;
      --shadow-sm:   0 1px 2px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.06);
      --shadow:      0 1px 3px rgba(0,0,0,.10), 0 2px 6px rgba(0,0,0,.07);
      --radius-sm:   8px;
      --radius-md:   12px;
      --radius-lg:   16px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:          #0E1318;
        --surface:     #161C22;
        --surf-con:    #1B2229;
        --surf-hi:     #202830;
        --border:      rgba(255,255,255,.09);
        --text:        #D8E2EA;
        --dim:         #7B90A2;
        --muted:       #4D6070;
        --primary:     #7BBCF5;
        --primary-bg:  rgba(123,188,245,.09);
        --on-primary:  #003563;
        --gold:        #E8C548;
        --gold-hi:     #FFCE4B;
        --win:         #4CAF50;
        --draw:        #FFA726;
        --loss:        #EF5350;
        --shadow-sm:   0 1px 2px rgba(0,0,0,.30);
        --shadow:      0 1px 4px rgba(0,0,0,.40);
      }
    }

    /* ─── RESET ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── BASE ───────────────────────────────────────────────────── */
    body {
      font-family: 'Roboto', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HEADER ─────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 24px 20px 20px;
      text-align: center;
      position: relative;
    }
    header::before {
      content: '';
      position: absolute;
      left: 0; right: 0; top: 0;
      height: 3px;
      background: linear-gradient(90deg,
        var(--primary) 0%,
        var(--gold-hi) 50%,
        var(--primary) 100%);
    }

    .header-inner { max-width: 600px; margin: 0 auto; }

    .header-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 10px;
    }

    header h1 {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      font-weight: 700;
      letter-spacing: -.01em;
      line-height: 1.2;
      color: var(--text);
    }
    header h1 span { color: var(--primary); }

    .header-hosts {
      margin-top: 8px;
      font-size: .8rem;
      color: var(--dim);
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 4px 12px;
    }
    .header-meta {
      margin-top: 4px;
      font-size: .72rem;
      color: var(--muted);
    }

    /* ─── TABS ───────────────────────────────────────────────────── */
    .tabs {
      position: sticky;
      top: 0;
      z-index: 200;
      background: var(--surface);
      display: flex;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
      box-shadow: 0 2px 6px rgba(0,0,0,.07);
    }
    @media (prefers-color-scheme: dark) {
      .tabs { box-shadow: 0 2px 6px rgba(0,0,0,.25); }
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex: 1;
      min-width: 80px;
      padding: 14px 12px 11px;
      border: none;
      background: none;
      color: var(--dim);
      font-family: inherit;
      font-size: .75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .06em;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* ─── PANELS ─────────────────────────────────────────────────── */
    .panel { display: none; }
    .panel.active { display: block; }
    .page { max-width: 1100px; margin: 0 auto; padding: 20px 16px 56px; }

    /* ─── CARD ───────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .card-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 13px 20px;
      background: var(--surf-con);
      border-bottom: 1px solid var(--border);
      font-size: .71rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--dim);
    }

    /* ─── LEADERBOARD ────────────────────────────────────────────── */
    .lb-row {
      display: grid;
      grid-template-columns: 48px 1fr 72px;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: var(--surf-con); }

    .lb-rank {
      font-size: 1.5rem;
      font-weight: 900;
      text-align: center;
      color: var(--muted);
      line-height: 1;
    }
    .lb-rank.r1 { color: #B5860E; }
    .lb-rank.r2 { color: #7C9AAB; }
    .lb-rank.r3 { color: #A0703A; }
    @media (prefers-color-scheme: dark) {
      .lb-rank.r1 { color: #FFD54F; }
      .lb-rank.r2 { color: #B0C4D2; }
      .lb-rank.r3 { color: #CD8C50; }
    }

    .lb-info { min-width: 0; }
    .lb-name { font-weight: 700; font-size: 1rem; }
    .lb-wdl  { font-size: .72rem; color: var(--dim); margin-top: 2px; }
    .lb-teams {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 8px;
    }
    .team-chip {
      font-size: .64rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
      background: var(--surf-hi);
      color: var(--dim);
    }
    .team-chip.scored {
      background: var(--surf-con);
      color: var(--text);
    }
    .lb-bar-wrap {
      height: 2px;
      background: var(--surf-hi);
      border-radius: 2px;
      margin-top: 10px;
    }
    .lb-bar {
      height: 2px;
      border-radius: 2px;
      transition: width .8s ease;
    }

    .lb-pts-col { text-align: right; }
    .lb-pts {
      font-size: 2.1rem;
      font-weight: 900;
      line-height: 1;
    }
    .lb-pts-label {
      font-size: .64rem;
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .06em;
    }



    /* ─── GROUPS ─────────────────────────────────────────────────── */
    .groups-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    @media (max-width: 900px) { .groups-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 640px) { .groups-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 380px) { .groups-grid { grid-template-columns: 1fr; } }

    .grp-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .grp-head {
      padding: 10px 14px;
      background: var(--surf-con);
      border-bottom: 1px solid var(--border);
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--primary);
    }
    .grp-table { width: 100%; border-collapse: collapse; }
    .grp-table th {
      padding: 5px 10px;
      font-size: .58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      text-align: right;
      border-bottom: 1px solid var(--border);
    }
    .grp-table th:first-child { text-align: left; }
    .grp-table td {
      padding: 8px 10px;
      font-size: .76rem;
      text-align: right;
      color: var(--dim);
      border-bottom: 1px solid var(--surf-hi);
    }
    .grp-table td:first-child { text-align: left; color: var(--text); }
    .grp-table tr:last-child td { border-bottom: none; }
    .grp-table td.pts-col { font-weight: 700; color: var(--text); }
    .grp-table tr.can-advance td.pts-col { color: var(--primary); }

    @media (max-width: 640px) { .grp-sec { display: none; } }

    .team-cell { display: flex; align-items: center; gap: 5px; }
    .owner-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .advance-bar {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(21,88,168,.3), transparent);
    }
    @media (prefers-color-scheme: dark) {
      .advance-bar {
        background: linear-gradient(90deg, transparent, rgba(123,188,245,.25), transparent);
      }
    }

    /* ─── SCHEDULE ───────────────────────────────────────────────── */
    .day-label {
      padding: 10px 20px 6px;
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--dim);
      border-top: 1px solid var(--border);
    }
    .day-label:first-child { border-top: none; }

    .match {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--surf-hi);
    }
    .match:last-child { border-bottom: none; }
    .match.today {
      background: var(--primary-bg);
      border-left: 3px solid var(--primary);
    }

    .match-side { display: flex; align-items: center; gap: 8px; }
    .match-side.away { flex-direction: row-reverse; text-align: right; }

    .flag { font-size: 1.3rem; flex-shrink: 0; line-height: 1; }
    .team-name { font-weight: 500; font-size: .86rem; line-height: 1.2; }
    .match-side.away .team-info { text-align: right; }
    .owner-tag {
      display: inline-block;
      font-size: .62rem;
      font-weight: 500;
      padding: 1px 6px;
      border-radius: 4px;
      margin-top: 2px;
    }

    .match-mid { text-align: center; min-width: 80px; flex-shrink: 0; }
    .score {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 1px;
      line-height: 1;
    }
    .grp-badge { font-size: .6rem; color: var(--muted); margin-top: 3px; }
    .vs { font-size: .9rem; color: var(--muted); }
    .today-pill {
      display: inline-block;
      background: var(--primary);
      color: var(--on-primary);
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .06em;
      padding: 2px 8px;
      border-radius: 20px;
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

    .sched-section { margin-bottom: 16px; }

    /* ─── PLAYERS ────────────────────────────────────────────────── */
    .players-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    @media (max-width: 860px) { .players-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .players-grid { grid-template-columns: 1fr; } }

    .player-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .player-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .player-name { font-weight: 700; font-size: 1.05rem; }
    .player-sub  { font-size: .68rem; color: var(--dim); margin-top: 2px; }
    .player-pts-wrap { text-align: right; }
    .player-pts { font-size: 1.9rem; font-weight: 900; line-height: 1; }
    .player-pts-label {
      font-size: .62rem;
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .pt-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--surf-hi);
      font-size: .8rem;
    }
    .pt-row:last-child { border-bottom: none; }
    .pt-left  { display: flex; align-items: center; gap: 7px; }
    .pt-right { font-weight: 700; font-size: .76rem; }
    .st-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .st-dot.win  { background: var(--win); }
    .st-dot.draw { background: var(--draw); }
    .st-dot.loss { background: var(--loss); }
    .st-dot.tbd  { background: var(--muted); }
    .c-win  { color: var(--win); }
    .c-draw { color: var(--draw); }
    .c-loss { color: var(--loss); }
    .c-tbd  { color: var(--muted); }

    /* ─── FOOTER ─────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 20px;
      font-size: .72rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* ─── RESPONSIVE ─────────────────────────────────────────────── */
    @media (max-width: 560px) {
      .lb-row { grid-template-columns: 36px 1fr 60px; gap: 8px; padding: 12px 14px; }
      .lb-pts { font-size: 1.8rem; }
      .lb-teams { display: none; }
      .match { gap: 6px; padding: 10px 14px; }
      .flag { font-size: 1.15rem; }
      .team-name { font-size: .8rem; }
    }
  </style>
</head>

/* ─── LOOKUPS ─────────────────────────────────────────────────── */
const TEAM_OWNER = {};
for (const [name, d] of Object.entries(OWNERS))
  for (const t of d.teams) TEAM_OWNER[t] = name;

const flag  = t => FLAGS[t] || '🏳️';
const owner = t => TEAM_OWNER[t] || null;
const ownerColor = t => { const o = owner(t); return o ? OWNERS[o].color : 'var(--dim)'; };

/* ─── SCORING ─────────────────────────────────────────────────── */
function teamMatchPts(team, m) {
  if (m.hg === null) return null;
  const h = m.home === team, a = m.away === team;
  if (!h && !a) return null;
  if (m.hg > m.ag) return h ? 3 : 0;
  if (m.hg < m.ag) return a ? 3 : 0;
  return 1;
}

function computeOwnerStats() {
  const stats = {};
  for (const [name, d] of Object.entries(OWNERS))
    stats[name] = { pts:0, wins:0, draws:0, losses:0, teamPts:{} };

  for (const m of MATCHES) {
    if (m.s !== 'done') continue;
    for (const [name, d] of Object.entries(OWNERS)) {
      for (const t of d.teams) {
        const p = teamMatchPts(t, m);
        if (p === null) continue;
        stats[name].pts += p;
        stats[name].teamPts[t] = (stats[name].teamPts[t] ?? 0) + p;
        if (p === 3) stats[name].wins++;
        else if (p === 1) stats[name].draws++;
        else stats[name].losses++;
      }
    }
  }
  return stats;
}

function computeGroupStandings() {
  const groups = {};
  for (const m of MATCHES) {
    if (!groups[m.grp]) groups[m.grp] = {};
    for (const t of [m.home, m.away]) {
      if (!groups[m.grp][t])
        groups[m.grp][t] = { p:0,w:0,d:0,l:0,gf:0,ga:0 };
    }
    if (m.s !== 'done') continue;
    const h = groups[m.grp][m.home], a = groups[m.grp][m.away];
    h.p++; a.p++;
    h.gf += m.hg; h.ga += m.ag;
    a.gf += m.ag; a.ga += m.hg;
    if (m.hg > m.ag)      { h.w++; a.l++; }
    else if (m.hg < m.ag) { a.w++; h.l++; }
    else                   { h.d++; a.d++; }
  }
  const sorted = {};
  for (const [grp, teams] of Object.entries(groups)) {
    sorted[grp] = Object.entries(teams)
      .map(([name, s]) => ({ name, ...s, pts: s.w*3 + s.d, gd: s.gf - s.ga }))
      .sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
  }
  return sorted;
}

/* ─── RENDER: LEADERBOARD ─────────────────────────────────────── */
function renderLeaderboard(stats) {
  const sorted = Object.entries(stats).sort((a,b) => b[1].pts - a[1].pts);
  const maxPts = Math.max(...sorted.map(([,s]) => s.pts), 1);
  const RANKS  = ['1','2','3','4','5','6'];
  const RCLS   = ['r1','r2','r3','','',''];

  const rows = sorted.map(([name, s], i) => {
    const { color, teams } = OWNERS[name];
    const pct = Math.round(s.pts / maxPts * 100);

    const chips = teams.map(t => {
      const tp = s.teamPts[t];
      const scored = tp != null && tp > 0;
      return '<span class="team-chip' + (scored ? ' scored' : '') + '">' + flag(t) + ' ' + t + '</span>';
    }).join('');

    return '<div class="lb-row">' +
      '<div class="lb-rank ' + RCLS[i] + '">' + RANKS[i] + '</div>' +
      '<div class="lb-info">' +
        '<div class="lb-name" style="color:' + color + '">' + name + '</div>' +
        '<div class="lb-wdl">' + s.wins + 'W &middot; ' + s.draws + 'D &middot; ' + s.losses + 'L</div>' +
        '<div class="lb-teams">' + chips + '</div>' +
        '<div class="lb-bar-wrap"><div class="lb-bar" style="width:' + pct + '%;background:' + color + '"></div></div>' +
      '</div>' +
      '<div class="lb-pts-col">' +
        '<div class="lb-pts" style="color:' + color + '">' + s.pts + '</div>' +
        '<div class="lb-pts-label">pts</div>' +
      '</div>' +
    '</div>';
  }).join('');

  document.getElementById('lb-card').innerHTML =
    '<div class="card-head"><span>🏆</span> Leaderboard</div>' + rows;
}

/* ─── RENDER: TODAY ───────────────────────────────────────────── */
function renderToday() {
  const today = MATCHES.filter(m => m.s === 'today');
  if (!today.length) { document.getElementById('today-card').remove(); return; }

  const rows = today.map(matchRow).join('');
  document.getElementById('today-card').innerHTML =
    '<div class="card-head"><span class="today-pill">TODAY</span>&nbsp;&nbsp;' + barcelonaDateTime(today[0].date, today[0].t).date + '</div>' + rows;
}

function renderGroups(groupStandings) {
  const grpOrder = 'ABCDEFGHIJKL'.split('');
  const html = grpOrder.map(grp => {
    const rows = groupStandings[grp];
    if (!rows) return '';

    const tableRows = rows.map((r, i) => {
      const color = ownerColor(r.name);
      const advancing = i < 2;
      return (
        '<tr class="' + (advancing ? 'can-advance' : '') + '">' +
          '<td><div class="team-cell">' +
            '<div class="owner-dot" style="background:' + color + '"></div>' +
            '<span>' + flag(r.name) + '</span>' +
            '<span>' + r.name + '</span>' +
          '</div></td>' +
          '<td class="grp-sec">' + r.p + '</td>' +
          '<td class="grp-sec">' + r.w + '</td>' +
          '<td class="grp-sec">' + r.d + '</td>' +
          '<td class="grp-sec">' + r.l + '</td>' +
          '<td class="grp-sec">' + (r.gd > 0 ? '+' + r.gd : r.gd) + '</td>' +
          '<td class="pts-col">' + r.pts + '</td>' +
        '</tr>' +
        (i === 1 ? '<tr><td colspan="7" class="advance-bar" style="padding:0"></td></tr>' : '')
      );
    }).join('');

    return (
      '<div class="grp-card">' +
        '<div class="grp-head">Group ' + grp + '</div>' +
        '<table class="grp-table">' +
          '<thead><tr>' +
            '<th>Team</th>' +

            '<th class="grp-sec">GD</th><th>Pts</th>' +
          '</tr></thead>' +
          '<tbody>' + tableRows + '</tbody>' +
        '</table>' +
      '</div>'
    );
  }).join('');

  document.getElementById('groups-grid').innerHTML = html;
}

/* ─── RENDER: SCHEDULE ────────────────────────────────────────── */

// WC runs entirely in CEST (UTC+2) — Barcelona is always UTC+2 during the tournament.
// When UTC hour + 2 >= 24, the Barcelona date is the next calendar day.
function barcelonaDateTime(utcDate, utcTime) {
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DAYS_IN = [31,28,31,30,31,30,31,31,30,31,30,31];
  if (!utcTime) return { date: utcDate, time: '' };
  const [h, min] = utcTime.split(':').map(Number);
  const bh = h + 2;
  const time = String(bh % 24).padStart(2, '0') + ':' + String(min).padStart(2, '0');
  if (bh < 24) return { date: utcDate, time };
  const parts = utcDate.split(' ');
  const mIdx = MONTHS.indexOf(parts[0]);
  let d = parseInt(parts[1]) + 1;
  let mo = mIdx;
  if (d > DAYS_IN[mo]) { d = 1; mo = (mo + 1) % 12; }
  return { date: MONTHS[mo] + ' ' + d, time };
}

function matchRow(m) {
  const hOwner = owner(m.home), aOwner = owner(m.away);
  const hColor = hOwner ? OWNERS[hOwner].color : 'var(--dim)';
  const aColor = aOwner ? OWNERS[aOwner].color : 'var(--dim)';

  const homeTag = hOwner
    ? '<span class="owner-tag" style="color:' + hColor + ';background:' + hColor + '18">' + hOwner + '</span>'
    : '';
  const awayTag = aOwner
    ? '<span class="owner-tag" style="color:' + aColor + ';background:' + aColor + '18">' + aOwner + '</span>'
    : '';

  let mid;
  if (m.s === 'done') {
    mid = '<div class="match-mid"><div class="score">' + m.hg + ' – ' + m.ag + '</div><div class="grp-badge">Grp ' + m.grp + '</div></div>';
  } else if (m.s === 'today') {
    const { time: t } = barcelonaDateTime(m.date, m.t);
    mid = '<div class="match-mid"><div><span class="today-pill">TODAY</span></div><div class="grp-badge">Grp ' + m.grp + (t ? ' \xb7 ' + t : '') + '</div></div>';
  } else {
    const { date: bDate, time: t } = barcelonaDateTime(m.date, m.t);
    mid = '<div class="match-mid"><div class="vs">vs</div><div class="grp-badge">Grp ' + m.grp + ' \xb7 ' + bDate + (t ? ' \xb7 ' + t : '') + '</div></div>';
  }

  return (
    '<div class="match' + (m.s === 'today' ? ' today' : '') + '">' +
      '<div class="match-side">' +
        '<span class="flag">' + flag(m.home) + '</span>' +
        '<div class="team-info"><div class="team-name">' + m.home + '</div>' + homeTag + '</div>' +
      '</div>' +
      mid +
      '<div class="match-side away">' +
        '<span class="flag">' + flag(m.away) + '</span>' +
        '<div class="team-info"><div class="team-name">' + m.away + '</div>' + awayTag + '</div>' +
      '</div>' +
    '</div>'
  );
}

function byDate(arr) {
  const map = {};
  for (const m of arr) {
    const key = barcelonaDateTime(m.date, m.t).date;
    if (!map[key]) map[key] = [];
    map[key].push(m);
  }
  return map;
}

function renderSchedule() {
  const today    = MATCHES.filter(m => m.s === 'today');
  const upcoming = MATCHES.filter(m => m.s === 'upcoming');
  const done     = MATCHES.filter(m => m.s === 'done');

  let html = '';

  if (done.length) {
    const grouped = byDate(done);
    let inner = '';
    for (const [date, matches] of Object.entries(grouped)) {
      inner += '<div class="day-label">' + date + '</div>';
      inner += matches.map(matchRow).join('');
    }
    html += '<div class="card sched-section"><div class="card-head">✅ Results</div>' + inner + '</div>';
  }

  html += '<div id="upcoming-anchor"></div>';

  if (today.length) {
    html += '<div class="card sched-section"><div class="card-head"><span class="today-pill">TODAY</span>&nbsp;&nbsp;' + barcelonaDateTime(today[0].date, today[0].t).date + '</div>' + today.map(matchRow).join('') + '</div>';
  }

  if (upcoming.length) {
    const grouped = byDate(upcoming);
    let inner = '';
    for (const [date, matches] of Object.entries(grouped)) {
      inner += '<div class="day-label">' + date + '</div>';
      inner += matches.map(matchRow).join('');
    }
    html += '<div class="card sched-section"><div class="card-head">📅 Upcoming</div>' + inner + '</div>';
  }

  document.getElementById('schedule-content').innerHTML = html;
}

/* ─── RENDER: PLAYERS ─────────────────────────────────────────── */
function renderPlayers(stats) {
  const sorted = Object.keys(OWNERS).sort((a,b) => stats[b].pts - stats[a].pts);

  function stClass(pts) {
    if (pts === null) return 'tbd';
    if (pts >= 3) return 'win';
    if (pts === 1) return 'draw';
    return 'loss';
  }

  const cards = sorted.map(name => {
    const { color, teams } = OWNERS[name];
    const s = stats[name];
    const wdl = s.wins + 'W \xb7 ' + s.draws + 'D \xb7 ' + s.losses + 'L';

    const teamRows = teams.map(t => {
      const tp = s.teamPts[t] ?? null;
      const st = stClass(tp);
      const label = tp === null ? '–' : '+' + tp;
      return (
        '<div class="pt-row">' +
          '<div class="pt-left">' +
            '<div class="st-dot ' + st + '"></div>' +
            '<span>' + flag(t) + '</span>' +
            '<span>' + t + '</span>' +
          '</div>' +
          '<div class="pt-right c-' + st + '">' + label + '</div>' +
        '</div>'
      );
    }).join('');

    return (
      '<div class="player-card">' +
        '<div class="player-head" style="border-bottom-color:' + color + '28;background:' + color + '10">' +
          '<div>' +
            '<div class="player-name" style="color:' + color + '">' + name + '</div>' +
            '<div class="player-sub">' + wdl + '</div>' +
          '</div>' +
          '<div class="player-pts-wrap">' +
            '<div class="player-pts" style="color:' + color + '">' + s.pts + '</div>' +
            '<div class="player-pts-label">pts</div>' +
          '</div>' +
        '</div>' +
        '<div class="player-teams">' + teamRows + '</div>' +
      '</div>'
    );
  }).join('');

  document.getElementById('players-grid').innerHTML = cards;
}

/* ─── TABS ────────────────────────────────────────────────────── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.panel).classList.add('active');

    if (btn.dataset.panel === 'schedule') {
      requestAnimationFrame(() => {
        const anchor = document.getElementById('upcoming-anchor');
        if (anchor) {
          const tabsH = document.querySelector('.tabs').offsetHeight;
          window.scrollTo({ top: anchor.getBoundingClientRect().top + window.scrollY - tabsH, behavior: 'instant' });
        }
      });
    }
  });
});

const ownerStats     = computeOwnerStats();
const groupStandings = computeGroupStandings();

renderLeaderboard(ownerStats);

renderSchedule();
renderPlayers(ownerStats);
